server:
  port: 8084

spring:

  application:
    name: ai-service

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: deepseek-r1:5b
          temperature: 0.2
          num-predict: 2048
          
  jackson:
    serialization:
      indent-output: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    root: INFO
    com.springboard7.ai: DEBUG
    org.springframework.ai: DEBUG

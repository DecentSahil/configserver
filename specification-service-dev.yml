spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/specification_db
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
        dialect: org.hibernate.dialect.PostgreSQLDialect
  cloud:
    openfeign:
      client:
        config:
          AI-SERVICE:
            connectTimeout: 3000
            readTimeout: 18000

resilience4j:
  retry:
    instances:
      ai-service:
        maxAttempts: 3
        waitDuration: 2s
  circuitbreaker:
    instances:
      ai-service:
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 2
        failureRateThreshold: 50
        waitDurationInOpenState: 20s

logging:
  level:
    root: INFO
    com.requirement: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "*"

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  specification:
    key-prefix: SPEC
